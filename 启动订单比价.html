<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>订单比价一键启动页</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0b1020;
      color: #e8ecf8;
    }
    .card {
      width: min(720px, calc(100vw - 32px));
      border-radius: 16px;
      padding: 24px;
      background: #131a2f;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
      line-height: 1.6;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 22px;
    }
    p {
      margin: 8px 0;
      color: #c7d2f2;
    }
    .ok { color: #50d890; }
    .warn { color: #ffd166; }
    .error { color: #ff6b6b; }
    pre {
      margin: 14px 0;
      padding: 12px;
      border-radius: 10px;
      overflow: auto;
      background: #0a0f1f;
      color: #f8fafc;
      border: 1px solid #293250;
    }
    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }
    button, a.btn {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }
    .primary {
      background: #4f7cff;
      color: white;
    }
    .ghost {
      background: #242e4d;
      color: #e8ecf8;
    }
    #tips { margin-top: 10px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>订单比价启动页</h1>
    <p id="status">正在检测本地服务状态...</p>
    <p id="tips"></p>
    <pre id="cmd" style="display:none;">cd /Users/zhangyang/Documents/order-detail-proxy && python3 server.py</pre>
    <div class="row" id="actions" style="display:none;">
      <button class="primary" id="copyBtn">复制启动命令</button>
      <a class="btn ghost" href="http://127.0.0.1:8787/" target="_blank" rel="noopener noreferrer">打开查询页面</a>
      <button class="ghost" id="retryBtn">重新检测</button>
    </div>
  </div>

  <script>
    const target = "http://127.0.0.1:8787/";
    const statusEl = document.getElementById("status");
    const tipsEl = document.getElementById("tips");
    const actionsEl = document.getElementById("actions");
    const cmdEl = document.getElementById("cmd");
    const copyBtn = document.getElementById("copyBtn");
    const retryBtn = document.getElementById("retryBtn");

    async function checkService() {
      statusEl.textContent = "正在检测本地服务状态...";
      statusEl.className = "";
      tipsEl.textContent = "";
      actionsEl.style.display = "none";
      cmdEl.style.display = "none";

      try {
        const res = await fetch(target, { method: "GET", mode: "cors" });
        if (res.ok) {
          statusEl.textContent = "检测成功：服务已启动，正在跳转查询页面...";
          statusEl.className = "ok";
          setTimeout(() => {
            window.location.href = target;
          }, 700);
          return;
        }
        throw new Error("HTTP " + res.status);
      } catch (err) {
        statusEl.textContent = "未检测到本地服务。";
        statusEl.className = "warn";
        tipsEl.innerHTML =
          "受浏览器安全限制，<strong>仅靠 HTML 文件无法直接启动本地 Python 服务</strong>。<br>" +
          "请先在终端运行下面命令，再点“重新检测”或“打开查询页面”。";
        actionsEl.style.display = "flex";
        cmdEl.style.display = "block";
      }
    }

    copyBtn.addEventListener("click", async () => {
      const text = cmdEl.textContent || "";
      try {
        await navigator.clipboard.writeText(text);
        copyBtn.textContent = "已复制";
        setTimeout(() => (copyBtn.textContent = "复制启动命令"), 1200);
      } catch (e) {
        statusEl.textContent = "复制失败，请手动复制命令。";
        statusEl.className = "error";
      }
    });

    retryBtn.addEventListener("click", checkService);
    checkService();
  </script>
</body>
</html>
